name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test and build
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    env:
      RH_PULSE_CALLS_ENABLED: "false"
      RH_PULSE_PHYSICAL_WALLET_GATE_PASSED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check patch whitespace
        run: git diff --check

  rh-pulse-postgres:
    name: RH Pulse PostgreSQL 14 gate
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    env:
      RH_PULSE_CALLS_ENABLED: "false"
      RH_PULSE_PHYSICAL_WALLET_GATE_PASSED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PostgreSQL 14
        run: |
          if [ ! -x /usr/lib/postgresql/14/bin/postgres ]; then
            sudo apt-get update
            sudo apt-get install --yes postgresql-14
          fi
          echo "/usr/lib/postgresql/14/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Run real-PostgreSQL production gate
        run: npm run test:rh-pulse:postgres
